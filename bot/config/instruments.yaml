    calibrated: false
    calibration_note: >
      Phase 3 regime classifier built. Empirical pass-rates pending Phase 4 backtest analysis.
      Watch: GBP/JPY is a high-pip-value pair; ATR-based thresholds may differ from lower-pip pairs.
    regime_calibration:
      adx_trend_min:
        value: 25.0
        pass_rate: pending_phase4_backtest
        note: default from §2; validate on 2yr H4 data
      adx_range_max:
        value: 20.0
        pass_rate: pending_phase4_backtest
      slope_persist_bars:
        value: 3
        pass_rate: pending_phase4_backtest
        note: check if 3-bar slope too strict given GBP/JPY volatility
      atr_expansion_ratio:
        value: 1.25
        pass_rate: pending_phase4_backtest
        note: may steal candles from TRENDING in strong trends — verify overlap rate
      atr_expansion_mean_mult:
        value: 1.3
        pass_rate: pending_phase4_backtest
      bb_compression_pct:
        value: 20
        pass_rate: pending_phase4_backtest
      bb_compression_window:
        value: 100
        pass_rate: pending_phase4_backtest
    trend_pullback_calibration:
      calibration_note: >
        Uses defaults.trend_pullback_params — no per-pair override. NOT RUN
        (2026-07-09 disposition): EUR_USD/USD_JPY both FAILED TRADING-RULES §5
        gates 3/4/6 decisively under this same spec (see ROADMAP.md's
        "trend_pullback H1 post-mortem"), so running the remaining pairs against
        the identical spec is not expected to be informative. Revisit only if
        the playbook is redefined (new edge thesis), not standalone.
    cost_model:
      spread_pips:
        asian: 3.9
        london: 3.5
        ny_overlap: 3.6
      max_spread_pips:
        asian: 4.4
        london: 3.9
        ny_overlap: 3.9
      slippage_pips: 0.92
      entry_blackout_hours_utc: [21]
      rollover_pips_per_day:
        long: 1.063
        short: -2.31602
      calibration_note: >
        PARTIALLY FILLED (2026-07-07): rollover_pips_per_day sourced from
        scripts/fetch_financing_rates.py run on PythonAnywhere (OANDA AccountInstruments
        financing.longRate/shortRate, converted to daily pips) — a real broker-published
        rate, not a guess.
        LIMITATION (2026-07-07): rollover_pips_per_day is a snapshot — fetch_financing_rates.py
        reads OANDA's CURRENT published rate once and that single value is then applied
        as a constant across the entire historical backtest window, even though real
        financing rates drift over time (they track central-bank policy rates, which
        moved materially across most 2-year backtest windows). This overstates or
        understates rollover cost for older segments of the backtest. Acceptable for
        Phase 4-7 (rollover is a minor cost component next to spread/slippage for
        typical hold times); revisit if Phase 11 forward-vs-backtest divergence
        implicates rollover specifically, or before running a strategy whose edge
        depends on very long holds.
        FILLED (2026-07-09, Session B): spread_pips/max_spread_pips/slippage_pips/
        entry_blackout_hours_utc sourced from instance/spread_samples.csv, sample
        window 2026-07-07T17:01Z-2026-07-09T14:56Z (OANDA PricingInfo via
        scripts/sample_spreads.py). Per-bucket sample counts this pair: asian=478
        (430 after excluding hour-21 UTC), london=176, ny_overlap=295 — all clear
        the >=100-observations-per-bucket sufficiency bar; london is the thinnest
        leg (~1.5 sessions of coverage) — FLAGGED for re-sampling enrichment next
        time the sampler runs, not disqualifying now. Two PA DNS outage gaps during
        this window (~09:08-11:11 and ~11:35-12:42 UTC, 2026-07-08) caused sampler
        poll failures but no corrupt rows; the Always-On loop survived both.
        spread_pips = per-bucket median; london/ny_overlap use the raw bucket
        median/p90 as sampled. asian's median AND max_spread_pips-source p90 are
        computed with hour-21 UTC EXCLUDED: that single hour carries a recurring
        spread blowout coincident with OANDA's daily rollover print (this pair's
        hour-21 median spread = 17.35 pips vs ~3.9 every other asian hour), and the
        asian bucket's 10 UTC-hour span means that one hour is ~10% of the bucket —
        almost exactly the p90 cutoff, so leaving it in would have still leaked
        rollover-artifact width into the gate even after moving off raw max (34.9).
        entry_blackout_hours_utc: [21] is new and refuses NEW entries during that
        hour in both backtest (bot.backtest.costs.entry_blackout_ok, wired into
        BacktestEngine._try_open_position) and live (Phase 8, same function) —
        without it the backtest would model fills during a spread condition the
        live gate would never see, since max_spread_pips no longer reflects that
        hour's true cost. max_spread_pips is ALSO session-bucketed (asian/london/
        ny_overlap), not one flat ceiling — a flat gate sized to the widest bucket
        would be systematically loose in the tighter sessions; asian's own
        threshold uses the hour-21-excluded p90 for the same reason its median
        does. PHASE 8 CONTRACT (also recorded in HANDOFF.md): the live executor
        must call bot.backtest.costs.spread_gate_ok and entry_blackout_ok
        directly against this same cost_model — no reimplementation of either
        gate in the live path. slippage_pips = 0.25 x this pair's pooled (all-session,
        count-weighted) median spread_pips (3.7) — an explicit INTERIM methodology,
        not a measurement: no real fill data exists yet (Phase 8 not built). Replace
        with journal.Order.spread_at_entry-derived slippage once Phase 8 ships.
        RE-BASELINE RULE above has now been run for this pair — see HANDOFF.md
        Session B for the golden/walk-forward re-run record.

