# Instrument configuration — tuning lives here, never in code.
# displayPrecision fetched from OANDA at startup (Phase 2); not hardcoded here.
# All thresholds in ATR multiples or rolling percentiles — raw price-percent banned (TRADING-RULES §1.2).
# Per-pair calibration required before enabling (TRADING-RULES §4.9).

# Account currency for pip-value conversion (bot/backtest/sizing.py). Never hardcoded in code —
# sizing math is generic over currency codes and reads this key.
account_currency: USD

defaults:
  timeframe_htf: H4       # anchor TF for regime classification
  timeframe_ltf: H1       # execution TF for entries
  risk_pct: 0.5           # % of equity risked per trade
  max_positions: 1        # per instrument
  history_years: 2        # one-time historical fetch depth (warm-store, not live loop)
  live_warmup_candles: 750  # gap-fetch size on bot restart (H1≈31d, H4≈125d)

  # Regime classifier parameters (Phase 3).
  # All thresholds require empirical pass-rate confirmation in Phase 4 (TRADING-RULES §1.7).
  # Per-pair overrides go under each instrument's regime_calibration block.
  regime_params:
    adx_period: 14
    adx_trend_min: 25.0          # ADX > this AND alignment AND slope → TRENDING candidate
    adx_range_max: 20.0          # ADX < this → RANGING candidate
    adx_exhaustion: 50.0         # ADX > this → trend exhaustion; trend playbook takes no new entries
    slope_persist_bars: 3        # EMA20 diffs must all be same sign for N consecutive bars
    atr_expansion_ratio: 1.25   # ATR(10)/ATR(50) > this → EXPANSION candidate
    atr_expansion_mean_mult: 1.3 # ATR(14) > this × 60-bar mean → EXPANSION candidate
    bb_period: 20
    bb_std: 2.0
    bb_compression_pct: 20       # BB width < own rolling Nth percentile → COMPRESSION
    bb_compression_window: 100   # rolling window bars for percentile calculation
    regime_confirm_bars: 2       # consecutive anchor candles to confirm a regime switch (§2 law)
    regime_min_hold_bars: 4      # min bars in regime before exit allowed (bypassed for EXPANSION entry)

  # trend_pullback strategy params (Phase 5, bot/strategies/trend_pullback.py).
  # TRENDING-only playbook: pulls back to the EMA20-EMA50 zone, needs ONE reversal
  # trigger (engulfing OR >=60%-body close OR Heikin-Ashi flip) + RSI on the trend's
  # side, vetoed if the pullback has broken beyond EMA200. SL = ATR-multiple vs recent
  # swing extreme (whichever is farther/more protective). No fixed TP — exit is
  # partial-at-1R + ATR/Chandelier trail on the remainder (bot/backtest/engine.py
  # exit_cfg), per TRADING-RULES §3.1.
  #
  # PROVISIONAL (2026-07-06): implements §3.1's prose spec with reasonable defaults.
  # NOT yet empirically validated — entry_threshold/score_weights/sl_atr_mult/
  # trail_atr_mult all need Session B's walk-forward + parameter-stability sweep
  # (TRADING-RULES §5 gates 3-4) once real cost_model values exist (see cost_model's
  # RE-BASELINE RULE below — same blocking dependency). Do not treat as ship-ready;
  # see HANDOFF.md Session A Decision 1/2 for the full reasoning.
  trend_pullback_params:
    rsi_period: 14
    pullback_zone_atr_min: 0.25   # tighter proximity to EMA20-EMA50 zone scores higher
    pullback_zone_atr_max: 0.5    # beyond this distance from the zone -> veto (outside_pullback_zone)
    sl_atr_mult: 1.75             # midpoint of §3.1's 1.5-2x ATR range
    swing_lookback_bars: 10       # recent swing extreme considered alongside the ATR-mult SL
    entry_threshold: 0.6          # confidence_score >= this AND no vetoes -> fires
    score_weights:                # must sum to 1.0; provisional, see calibration_note above
      pullback_zone: 0.3
      reversal_trigger: 0.25
      rsi_side: 0.25
      ema200_side: 0.2            # §3.1 scores pullback-depth-vs-EMA200, not a hard gate — see
                                   # bot/strategies/trend_pullback.py's _ema200_side_score docstring
    exit:
      partial_fraction: 0.5       # fraction of units closed at partial_at_r
      partial_at_r: 1.0           # R-multiple (of the original ATR-mult stop distance) that triggers the partial
      breakeven_after_partial: false  # NOT in §3.1 — must earn its way in via walk-forward, never a silent default
      trail_atr_period: 22        # standard Chandelier Exit ATR period
      trail_atr_mult: 3.0         # standard Chandelier Exit multiplier

  # range_reversion strategy params (Phase 6, bot/strategies/range_reversion.py).
  # RANGING-only playbook: re-entry close back inside a Bollinger Band + RSI turning
  # from an extreme, mirrored long/short. Only 2 scored components (band_reentry,
  # rsi_recovery) — deliberate match to §3.2's letter (two conditions joined by "+"),
  # not padded to trend_pullback's 4-component shape. SL = rejection-candle extreme
  # +/- ATR-mult. TP = static middle-band value at signal time (documented
  # approximation, see range_reversion.py's module docstring, disposition 3 —
  # 2026-07-09). Hard veto: LTF-level instant expansion/ATR-spike check, reusing
  # regime_params' dimensionless ratio/mean-mult thresholds (see range_reversion.py's
  # _expansion_veto docstring) — CONTINGENT (disposition 4, 2026-07-09) on a §1.7
  # pass-rate check per pair before that pair's gates are trusted.
  #
  # AND/OR PRE-REGISTRATION (disposition 1, 2026-07-09): both scored components are
  # binary and their weights sum to 1.0, so confidence_score in {0, w_a, w_b, 1.0} —
  # the entry_threshold/score_weights walk-forward search selects among discrete
  # effective regimes (OR / asymmetric / AND), not a continuous dial. See
  # range_reversion.py's module docstring for the exact boundary math. If a window's
  # IS selection lands in OR or asymmetric, that overrules §3.2's conjunctive letter
  # for that window and must be stated explicitly wherever this playbook's
  # calibration_note is written per pair — not silently accepted.
  #
  # PROVISIONAL (2026-07-09): implements §3.2's prose spec with reasonable defaults.
  # NOT yet empirically validated — same disposition as trend_pullback_params carried
  # at Phase 5 kickoff; entry_threshold/score_weights/sl_atr_mult/rejection_lookback_
  # bars all need TRADING-RULES §5 gates 3-4 (walk-forward + parameter-stability) once
  # run against real cost_model + real history (already available locally, see
  # HANDOFF.md — no PA fetch needed this phase).
  range_reversion_params:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_oversold_threshold: 30.0   # long: RSI < this, turning up. Short mirrored at (100 - this) = 70, per §3.2's own "mirrored" instruction — not an invented second threshold.
    rejection_lookback_bars: 3    # local rejection-candle extreme lookback — tighter than trend_pullback's swing_lookback_bars=10; a mean-reversion rejection is a more local structure than a trend swing.
    sl_atr_mult: 1.25             # midpoint of §3.2's 1-1.5x ATR range, same convention trend_pullback used
    entry_threshold: 0.55         # > max(score_weights) below -> starts in the AND region (both components required), matching §3.2's literal "+"; subject to per-window walk-forward search (see AND/OR pre-registration above)
    score_weights:                # must sum to 1.0; provisional, see calibration_note above
      band_reentry: 0.5
      rsi_recovery: 0.5
    expansion_veto_atr_ratio: 1.25       # reused from regime_params.atr_expansion_ratio (dimensionless multiplier, computed on THIS strategy's LTF window, not the HTF regime classifier's) — see range_reversion.py's _expansion_veto docstring
    expansion_veto_atr_mean_mult: 1.3    # reused from regime_params.atr_expansion_mean_mult, same rationale

  # squeeze_breakout strategy params (Phase 7, bot/strategies/squeeze_breakout.py).
  # COMPRESSION-only playbook: regime==COMPRESSION IS the precondition (§3.3's
  # precondition bullet is verbatim §2's own COMPRESSION definition, not a second
  # check — see squeeze_breakout.py's module docstring, DISPOSITION 1). Trigger =
  # 4 scored binary components (close_beyond_band, atr_expansion, body_pct — §3.3's
  # three "+"-joined conditions — plus tick_volume as required low-weight weak
  # evidence, DISPOSITION 3), never vetoes — vetoes is structurally always empty for
  # this strategy. SL = whichever is farther/more protective of (compression-box
  # opposite side, sl_atr_mult*ATR) — DISPOSITION 5. No fixed TP — exit is the SAME
  # partial-at-1R + ATR/Chandelier trail exit_cfg trend_pullback uses (own numbers
  # below), DISPOSITION 6 (§3.3 gives no exit/target language at all; a trailed exit
  # matches the "cost-tolerant, larger-target" thesis a fixed TP would cap).
  #
  # PROVISIONAL (2026-07-10): implements §3.3's prose spec with reasonable defaults,
  # same disposition as both prior playbooks' kickoffs. NOT yet empirically validated —
  # entry_threshold/score_weights searched inside each walk-forward window's own IS
  # slice (TRADING-RULES §5 gates 3-4) once real gates run this phase. See HANDOFF.md
  # and the approved plan doc for the full spec-mapping reasoning (6 dispositions + 2
  # approved additions: a hysteresis-excluded diagnostic and a realized-R-distribution
  # non-degeneracy check, both reported once real gates run).
  squeeze_breakout_params:
    bb_period: 20
    bb_std: 2.0
    compression_box_lookback_bars: 20   # recent high/low extent defining the "compression box", excludes the trigger bar itself; matches bb_period — see DISPOSITION 5
    sl_atr_mult: 1.5                    # §3.3's own exact number (no range given, unlike §3.1/§3.2 — no midpoint decision needed)
    atr_expansion_ratio: 1.25           # reused from regime_params.atr_expansion_ratio (dimensionless, computed on THIS strategy's LTF window) — see squeeze_breakout.py's _atr_expansion_score docstring
    atr_expansion_mean_mult: 1.3        # reused from regime_params.atr_expansion_mean_mult, same rationale
    volume_lookback_bars: 20            # tick-volume's own rolling-mean window, same "expansion vs own recent mean" shape as ATR expansion
    volume_expansion_mult: 1.3          # reuses the same dimensionless-multiplier convention as atr_expansion_mean_mult rather than inventing a new kind of threshold
    entry_threshold: 0.85                # sits just below the 3-real-trigger-AND sum (0.3+0.3+0.3=0.9, float-realized as 0.8999999999999999 — 0.85 gives a safe margin rather than landing exactly on that float boundary) and comfortably above any 2-real+volume combination (max 0.7) — tick_volume structurally cannot rescue a missing real trigger at this weighting; subject to per-window walk-forward search (DISPOSITION 2)
    score_weights:                      # must sum to 1.0; provisional, see calibration_note above
      close_beyond_band: 0.3
      atr_expansion: 0.3
      body_pct: 0.3
      tick_volume: 0.1                  # fixed low across the whole grid (DISPOSITION 3) — "weak evidence", never load-bearing
    exit:
      partial_fraction: 0.5             # fraction of units closed at partial_at_r
      partial_at_r: 1.0                 # R-multiple that triggers the partial — same convention trend_pullback uses, own number (not copied)
      breakeven_after_partial: false    # NOT in §3.3 — must earn its way in via walk-forward, never a silent default
      trail_atr_period: 22              # standard Chandelier Exit ATR period
      trail_atr_mult: 3.0               # standard Chandelier Exit multiplier

  # Cost model (Phase 4, bot/backtest/costs.py + sizing.py). No shared defaults here —
  # per TRADING-RULES §1.7 every threshold ships with a calibration note, and spread/
  # rollover are pair-specific by nature (GBP/JPY spreads nothing like EUR/USD). Each
  # instrument below carries its own cost_model block, seeded PENDING (null) until
  # sampled — see calibration_note on each block for the source.
  #   spread_pips: session-bucketed (asian/london/ny_overlap UTC-hour buckets, see
  #     bot.backtest.costs.session_for_hour) — a single average under/over-charges
  #     half the trading day.
  #   max_spread_pips: entry gate, session-bucketed like spread_pips (Session B,
  #     2026-07-09) — a single flat ceiling sized to the widest bucket (asian) would be
  #     systematically loose in the tighter london/ny_overlap sessions, so "abnormal
  #     spread" is judged relative to the session actually being traded. Backtester AND
  #     (Phase 8) live executor refuse entries when the CURRENT session's spread exceeds
  #     THAT session's threshold — same bot.backtest.costs.spread_gate_ok function both
  #     places, not a reimplementation.
  #   slippage_pips: charged on market entries and SL exits; doubled on SL exits when
  #     the regime at exit is EXPANSION; never charged on TP fills.
  #   rollover_pips_per_day.long/short: per-unit cost applied once per UTC-day
  #     rollover-time (22:00 UTC, approximate) crossed while a position is open.
  #     Sourced from OANDA's own published per-instrument financing rates via
  #     scripts/fetch_financing_rates.py (converts the broker's annualized
  #     longRate/shortRate into a daily-pip figure) — NOT a manual guess.
  #
  # RE-BASELINE RULE: filling in any PENDING value below (spread, slippage, rollover)
  # WILL shift golden-run / walk-forward metrics for any Phase 5+ strategy that reads
  # these values. Required sequence: fill values -> re-run existing goldens/walk-forward
  # -> expect the shift -> re-baseline deliberately with a dated note here and in the
  # relevant test file. Never regenerate a baseline silently (PROMPTS.md §5.7).

