# Instrument configuration — tuning lives here, never in code.
# displayPrecision fetched from OANDA at startup (Phase 2); not hardcoded here.
# All thresholds in ATR multiples or rolling percentiles — raw price-percent banned (TRADING-RULES §1.2).
# Per-pair calibration required before enabling (TRADING-RULES §4.9).

# Account currency for pip-value conversion (bot/backtest/sizing.py). Never hardcoded in code —
# sizing math is generic over currency codes and reads this key.
account_currency: USD

defaults:
  timeframe_htf: H4       # anchor TF for regime classification
  timeframe_ltf: H1       # execution TF for entries
  risk_pct: 0.5           # % of equity risked per trade
  max_positions: 1        # per instrument
  history_years: 2        # one-time historical fetch depth (warm-store, not live loop)
  live_warmup_candles: 750  # gap-fetch size on bot restart (H1≈31d, H4≈125d)

  # Regime classifier parameters (Phase 3).
  # All thresholds require empirical pass-rate confirmation in Phase 4 (TRADING-RULES §1.7).
  # Per-pair overrides go under each instrument's regime_calibration block.
  regime_params:
    adx_period: 14
    adx_trend_min: 25.0          # ADX > this AND alignment AND slope → TRENDING candidate
    adx_range_max: 20.0          # ADX < this → RANGING candidate
    adx_exhaustion: 50.0         # ADX > this → trend exhaustion; trend playbook takes no new entries
    slope_persist_bars: 3        # EMA20 diffs must all be same sign for N consecutive bars
    atr_expansion_ratio: 1.25   # ATR(10)/ATR(50) > this → EXPANSION candidate
    atr_expansion_mean_mult: 1.3 # ATR(14) > this × 60-bar mean → EXPANSION candidate
    bb_period: 20
    bb_std: 2.0
    bb_compression_pct: 20       # BB width < own rolling Nth percentile → COMPRESSION
    bb_compression_window: 100   # rolling window bars for percentile calculation
    regime_confirm_bars: 2       # consecutive anchor candles to confirm a regime switch (§2 law)
    regime_min_hold_bars: 4      # min bars in regime before exit allowed (bypassed for EXPANSION entry)

  # trend_pullback strategy params (Phase 5, bot/strategies/trend_pullback.py).
  # TRENDING-only playbook: pulls back to the EMA20-EMA50 zone, needs ONE reversal
  # trigger (engulfing OR >=60%-body close OR Heikin-Ashi flip) + RSI on the trend's
  # side, vetoed if the pullback has broken beyond EMA200. SL = ATR-multiple vs recent
  # swing extreme (whichever is farther/more protective). No fixed TP — exit is
  # partial-at-1R + ATR/Chandelier trail on the remainder (bot/backtest/engine.py
  # exit_cfg), per TRADING-RULES §3.1.
  #
  # PROVISIONAL (2026-07-06): implements §3.1's prose spec with reasonable defaults.
  # NOT yet empirically validated — entry_threshold/score_weights/sl_atr_mult/
  # trail_atr_mult all need Session B's walk-forward + parameter-stability sweep
  # (TRADING-RULES §5 gates 3-4) once real cost_model values exist (see cost_model's
  # RE-BASELINE RULE below — same blocking dependency). Do not treat as ship-ready;
  # see HANDOFF.md Session A Decision 1/2 for the full reasoning.
  trend_pullback_params:
    rsi_period: 14
    pullback_zone_atr_min: 0.25   # tighter proximity to EMA20-EMA50 zone scores higher
    pullback_zone_atr_max: 0.5    # beyond this distance from the zone -> veto (outside_pullback_zone)
    sl_atr_mult: 1.75             # midpoint of §3.1's 1.5-2x ATR range
    swing_lookback_bars: 10       # recent swing extreme considered alongside the ATR-mult SL
    entry_threshold: 0.6          # confidence_score >= this AND no vetoes -> fires
    score_weights:                # must sum to 1.0; provisional, see calibration_note above
      pullback_zone: 0.3
      reversal_trigger: 0.25
      rsi_side: 0.25
      ema200_side: 0.2            # §3.1 scores pullback-depth-vs-EMA200, not a hard gate — see
                                   # bot/strategies/trend_pullback.py's _ema200_side_score docstring
    exit:
      partial_fraction: 0.5       # fraction of units closed at partial_at_r
      partial_at_r: 1.0           # R-multiple (of the original ATR-mult stop distance) that triggers the partial
      breakeven_after_partial: false  # NOT in §3.1 — must earn its way in via walk-forward, never a silent default
      trail_atr_period: 22        # standard Chandelier Exit ATR period
      trail_atr_mult: 3.0         # standard Chandelier Exit multiplier

  # Cost model (Phase 4, bot/backtest/costs.py + sizing.py). No shared defaults here —
  # per TRADING-RULES §1.7 every threshold ships with a calibration note, and spread/
  # rollover are pair-specific by nature (GBP/JPY spreads nothing like EUR/USD). Each
  # instrument below carries its own cost_model block, seeded PENDING (null) until
  # sampled — see calibration_note on each block for the source.
  #   spread_pips: session-bucketed (asian/london/ny_overlap UTC-hour buckets, see
  #     bot.backtest.costs.session_for_hour) — a single average under/over-charges
  #     half the trading day.
  #   max_spread_pips: entry gate, session-bucketed like spread_pips (Session B,
  #     2026-07-09) — a single flat ceiling sized to the widest bucket (asian) would be
  #     systematically loose in the tighter london/ny_overlap sessions, so "abnormal
  #     spread" is judged relative to the session actually being traded. Backtester AND
  #     (Phase 8) live executor refuse entries when the CURRENT session's spread exceeds
  #     THAT session's threshold — same bot.backtest.costs.spread_gate_ok function both
  #     places, not a reimplementation.
  #   slippage_pips: charged on market entries and SL exits; doubled on SL exits when
  #     the regime at exit is EXPANSION; never charged on TP fills.
  #   rollover_pips_per_day.long/short: per-unit cost applied once per UTC-day
  #     rollover-time (22:00 UTC, approximate) crossed while a position is open.
  #     Sourced from OANDA's own published per-instrument financing rates via
  #     scripts/fetch_financing_rates.py (converts the broker's annualized
  #     longRate/shortRate into a daily-pip figure) — NOT a manual guess.
  #
  # RE-BASELINE RULE: filling in any PENDING value below (spread, slippage, rollover)
  # WILL shift golden-run / walk-forward metrics for any Phase 5+ strategy that reads
  # these values. Required sequence: fill values -> re-run existing goldens/walk-forward
  # -> expect the shift -> re-baseline deliberately with a dated note here and in the
  # relevant test file. Never regenerate a baseline silently (PROMPTS.md §5.7).

instruments:
